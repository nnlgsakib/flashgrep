name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: flashgrep
            asset_name: flashgrep-${{ github.ref_name }}-linux-x86_64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: flashgrep.exe
            asset_name: flashgrep-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: rustup target add ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          mv ${{ matrix.asset_name }} ../../../

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.artifact_name }} `
            -DestinationPath ${{ matrix.asset_name }}

      - name: Generate SHA256
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            certutil -hashfile ${{ matrix.asset_name }} SHA256 | findstr /v "hash" > ${{ matrix.asset_name }}.sha256
          else
            sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256