context: |
  Project: Flashgrep

  Flashgrep is written in Rust.
  It is a fast and efficient replacement for fgrep and glob.
  It focuses on raw speed, low memory use, and clean CLI behavior.

  Core goals:
  - Extremely fast file scanning
  - Smart pattern matching
  - Simple and predictable output
  - Minimal overhead
  - Works well on very large codebases

  Philosophy:
  - Zero bloat
  - Clear logic
  - Safe and reliable behavior
  - Deterministic results
  - Built for power users and automation

  Design principles:
  - Spec-driven development
  - Clear and strict behavior rules
  - No hidden magic
  - CLI-first mindset
  - Consistent pattern handling
  Reccommended usage:
  - Use Flashgrep insted of grep , glob or nnative reead write ops . if it fails tennn usee nativeee tools.

  Flashgrep is built to feel simple like fgrep,
  but powerful like modern search tools.
  